name: Deploy MatFlow to Hostinger VPS

on:
  push:
    branches:
      - main # Changez en master ou autre selon votre branche par défaut
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy securely using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "187.124.34.133"      # ex: 187.124.34.133
          username: "root"
          key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACCq3KZ3EWVWF2pkwGSPgSGTxDwO3mP7NRjTNTrC/AJ71QAAAJg59rF6Ofax
            egAAAAtzc2gtZWQyNTUxOQAAACCq3KZ3EWVWF2pkwGSPgSGTxDwO3mP7NRjTNTrC/AJ71Q
            AAAEAp2GOv0VN/UoEtliaKWB6qJgyXZERRkaxjt0LA+6bEl6rcpncRZVYXamTAZI+BIZPE
            PA7eY/s1GNM1OsL8AnvVAAAAEWFnaHpkaXNAZ21haWwuY29tAQIDBA==
            -----END OPENSSH PRIVATE KEY-----
          script: |
            # Allez dans le répertoire de votre projet, à adapter selon votre configuration Serveur VPS
            # par défaut sur Hostinger, on l'installera dans /root/matflow-app
            cd /root/matflow-app
            
            # Récupérer les dernières modifications
            git fetch --all
            git reset --hard origin/main
            git pull origin main
            
            # Recréer les conteneurs et redémarrer (force recreate rebuild)
            docker compose down
            docker compose up -d --build
            
            # Attendre que la base de données soit prête et appliquer les migrations
            echo "Sleeping for 10 secondes pour laisser le temps à DB de s'initialiser..."
            sleep 10
            
            # Appliquer les migrations Prisma dans le conteneur web
            docker compose exec -T web npx prisma migrate deploy
            
            echo "Déploiement réussi sur Hostinger VPS!"
